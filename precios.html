<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cΔrovΣr0 · precios</title>
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: "Lucida Console", Monaco, monospace;
      font-size: 15px;
      line-height: 1.2;  
      margin: 0;
      padding: 20px;
    }

    .terminal {
      max-width: 90ch;
      width: 100%;
      margin: 0;
    }

    .price-line {
      display: flex;
      justify-content: space-between;
      margin: 1px 0;
      max-width: 90ch;
      font-family: "Lucida Console", Monaco, monospace;
      font-size: 15px;
      line-height: 1.2;
    }

    .price-rank {
      color: #fff;
      width: 4ch;
      text-align: right;
      margin-right: 2ch;
    }

    .price-name {
      color: #fff;
      width: 22ch;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .price-symbol {
      color: #777;
      margin-left: 1ch;
      font-size: 13px;
    }

    .price-value {
      width: 14ch;
      text-align: right;
      margin-right: 2ch;
    }

    .price-change {
      width: 10ch;
      text-align: right;
      margin-right: 2ch;
    }

    .price-change-7d {
      width: 10ch;
      text-align: right;
      margin-right: 2ch;
    }

    .price-privacy {
      width: 5ch;
      text-align: left;
    }

    .positive { color: #198652; }
    .negative { color: #9B1C2E; }

    .privacy-marker {
      color: #b8a0ff;
      font-weight: normal;
    }

    .sep-raw {
      color: #fff;
      white-space: pre;
      font-size: 15px;
      margin: 10px 0;
      letter-spacing: normal;
    }

    .small {
      color: #777;
      font-size: 15px;
      margin-top: 2px;
      line-height: 1.2;
    }
  </style>
</head>
<body>
  <div class="terminal">
    <h1>cΔrovΣr0 • Precios</h1>
    Sin trackers, ads y scripts basura. Solo datos
    <div><br></div>
    <div class="price-line" style="color: #9B1C2E; margin-bottom: 5px;">
      <span class="price-rank">#</span>
      <span class="price-name">NOMBRE</span>
      <span class="price-value">PRECIO</span>
      <span class="price-change">24H%</span>
      <span class="price-change-7d">7D%</span>
      <span class="price-privacy">PRIV</span>
    </div>
    <div id="crypto-container"></div>
    <div class="sep-raw">════════════════════════════════════════════════════════════════════════════════ 
© 2026 Creada con ♥ por cΔrovΣr0 · apoya: carover0.firo
    </div>
    <div class="small" id="updated"></div>
  </div>

  <script>
    const coins = [
      "bitcoin", "bitcoin-cash", "litecoin", "zcash",
      "dash", "digibyte", "pivx", "zcoin", "pirate-chain", "ycash"
    ];

    const privacyCoins = {
      "zcash": true,
      "dash": true,
      "pivx": true,
      "zcoin": true,
      "pirate-chain": true,
      "ycash": true
    };

    function formatPriceLine(coin) {
      const change24 = coin.price_change_percentage_24h;
      const change7d = coin.price_change_percentage_7d_in_currency;
      
      const change24Class = change24 >= 0 ? "positive" : "negative";
      const change7dClass = change7d >= 0 ? "positive" : "negative";
      
      const isPrivacy = privacyCoins[coin.id] || false;
      const privacyIcon = isPrivacy ? '<span class="privacy-marker">🛡</span>' : '·';
      
      const price = coin.current_price < 1 
        ? `$${coin.current_price.toFixed(6)}` 
        : `$${coin.current_price.toFixed(2)}`;

      const change24Display = change24 ? (change24 >= 0 ? `+${change24.toFixed(2)}` : `${change24.toFixed(2)}`) : '0.00';
      const change7dDisplay = change7d ? (change7d >= 0 ? `+${change7d.toFixed(2)}` : `${change7d.toFixed(2)}`) : '0.00';

      return `
        <div class="price-line">
          <span class="price-rank">${coin.market_cap_rank}</span>
          <span class="price-name">
            ${coin.name}<span class="price-symbol">${coin.symbol.toUpperCase()}</span>
          </span>
          <span class="price-value">${price}</span>
          <span class="price-change ${change24Class}">${change24Display}%</span>
          <span class="price-change-7d ${change7dClass}">${change7dDisplay}%</span>
          <span class="price-privacy">${privacyIcon}</span>
        </div>
      `;
    }

    async function fetchData() {
      try {
        const res = await fetch(
          `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${coins.join(",")}&order=market_cap_desc&price_change_percentage=24h,7d`
        );

        if (!res.ok) throw new Error(`HTTP error ${res.status}`);

        const data = await res.json();
        data.sort((a, b) => a.market_cap_rank - b.market_cap_rank);

        const container = document.getElementById("crypto-container");
        
        let lines = '';
        data.forEach(coin => {
          lines += formatPriceLine(coin);
        });

        container.innerHTML = lines;

        document.getElementById("updated").innerText =
          `actualizado: ${new Date().toLocaleTimeString()}  ·  fuente: coingecko`;

      } catch (error) {
        document.getElementById("crypto-container").innerHTML = 
          `<div class="price-line" style="color: #9B1C2E;">ERROR: ${error.message}</div>`;
      }
    }

    fetchData();
    setInterval(fetchData, 60000);
  </script>
</body>
</html>
