<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirigiendo...</title>
    <script>
        const path = window.location.pathname;
        
        let explorer = null;
        let searchParam = null;
        
        const explorers = [
            { name: 'zec-explorer', pattern: /\/zec-explorer\/(.+)$/ },
            { name: 'pivx-explorer', pattern: /\/pivx-explorer\/(.+)$/ },
            { name: 'pirate-explorer', pattern: /\/pirate-explorer\/(.+)$/ },
            { name: 'komodo-explorer', pattern: /\/komodo-explorer\/(.+)$/ },
	        { name: 'firo-explorer', pattern: /\/firo-explorer\/(.+)$/ } 
    
        ];
        
        for (let exp of explorers) {
            const match = path.match(exp.pattern);
            if (match && match[1]) {
                explorer = exp.name;
                searchParam = match[1];
                break;
            }
        }
        
        if (explorer && searchParam) {
            window.location.replace('/pagina/' + explorer + '?q=' + encodeURIComponent(searchParam));
        } else {
            window.location.replace('/pagina/zec-explorer');
        }
    </script>
</head>
<body>
    <p>Redirigiendo al explorer correcto...</p>
</body>
</html>
