<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirigiendo...</title>
    <script>
        // Extraer la ruta después de /zec-explorer/
        const path = window.location.pathname;
        
        // Buscar el patrón /zec-explorer/ALGO
        const match = path.match(/\/zec-explorer\/(.+)$/);
        
        if (match && match[1]) {
            const searchParam = match[1];
            // Redirigir a zec-explorer con query string
            window.location.replace('/pagina/zec-explorer?q=' + encodeURIComponent(searchParam));
        } else {
            // Si no hay parámetro, ir al explorador principal
            window.location.replace('/pagina/zec-explorer');
        }
    </script>
</head>
<body>
    <p>Redirigiendo...</p>
</body>
</html>
