<div class="terminal">cΔrovΣr0 • FIRO EXPLORER

<script>
// FIRO TERMINAL EXPLORER - Adaptado de ZEC
const API_URL = "https://carover0.xyz/api/firo/rpc.php";
const TOKEN = "firo2026";
const STATUS_URL = "https://carover0.xyz/api/firo.json";

// ========== DETECTAR BUSQUEDA DESDE URL ==========
function detectSearchFromUrl() {
    const urlParams = new URLSearchParams(window.location.search);
    const queryParam = urlParams.get('q');
    
    if (queryParam) {
        console.log('🔍 Desde query string:', queryParam);
        return queryParam;
    }
    
    const path = window.location.pathname;
    const match = path.match(/\/firo-explorer\/(.+)$/);
    
    if (match && match[1]) {
        const cleanParam = match[1];
        console.log('🔍 Desde ruta /firo-explorer/:', cleanParam);
        return cleanParam;
    }
    
    return null;
}

// ========== ACTUALIZAR URL PARA COMPARTIR ==========
function updateUrlWithSearch(parametro) {
    const basePath = window.location.origin + '/pagina';
    const newUrl = basePath + '/firo-explorer/' + encodeURIComponent(parametro);
    
    window.history.replaceState({}, '', newUrl);
    console.log('🔗 URL actualizada:', newUrl);
}

// ========== DETECCION AUTOMATICA ==========
function detectCommand(input) {
    input = input.trim();
    
    if (input.startsWith('getblock') || 
        input.startsWith('getrawtransaction') || 
        input.startsWith('validateaddress') ||
        input.startsWith('getaddressbalance') ||
        input.startsWith('HASH:')) {
        return input;
    }
    
    if (/^\d+$/.test(input)) {
        return `getblockhash ${input}`;
    }
    
    if (/^[a-fA-F0-9]{64}$/.test(input)) {
        return `HASH:${input}`;
    }
    
    if (/^[Ff][a-zA-Z0-9]{33,34}$/.test(input) || /^[aA][a-zA-Z0-9]{33,34}$/.test(input)) {
        return `validateaddress ${input}`;
    }
    
    if (input.length > 50) {
        if (input.startsWith('validateaddress')) {
            return input;
        }
        return `validateaddress ${input}`;
    }
    
    return input;
}

// ========== CARGA DE ESTADOS ==========
async function loadNetworkStats() {
    try {
        const r = await fetch(STATUS_URL);
        const d = await r.json();
        
        document.getElementById('stat-height').innerText = d.blockchain?.blocks?.toLocaleString() || '---';
        document.getElementById('stat-difficulty').innerText = d.blockchain?.difficulty?.toFixed(2) || '---';
        document.getElementById('stat-connections').innerText = d.network?.connections || '---';
        document.getElementById('stat-mempool').innerText = d.mempool?.txcount || '0';
        
    } catch(e) {
        // Silencio
    }
}

async function getVinValue(txid, vout) {
    try {
        const r = await fetch(`${API_URL}?token=${TOKEN}&cmd=getrawtransaction%20${txid}%201`);
        const data = await r.json();
        
        if (data.result && data.result.vout && data.result.vout[vout]) {
            return data.result.vout[vout].value;
        }
        return null;
    } catch(e) {
        return null;
    }
}

// ========== EJECUCION DE BUSQUEDA ==========
async function executeSearch(q) {
    const out = document.getElementById('output');
    out.innerHTML = '<pre>Ejecutando...</pre>';
    document.getElementById("pie").style.display = "none";

    let rawParam = '';
    
    if (q.startsWith('getblock ')) {
        rawParam = q.replace('getblock ', '');
    } else if (q.startsWith('getblockhash ')) {
        rawParam = q.replace('getblockhash ', '');
    } else if (q.startsWith('getrawtransaction ')) {
        rawParam = q.replace('getrawtransaction ', '').replace(' 1', '');
    } else if (q.startsWith('validateaddress ') || q.startsWith('getaddressbalance ')) {
        rawParam = q.split(' ')[1];
    } else if (q.startsWith('HASH:')) {
        rawParam = q.substring(5);
    } else {
        if (/^\d+$/.test(q)) {
            rawParam = q;
        } else if (/^[a-fA-F0-9]{64}$/.test(q)) {
            rawParam = q;
        } else if (q.startsWith('F') || q.startsWith('a') || q.startsWith('A')) {
            rawParam = q;
        }
    }
    
    // Actualizar URL con ruta limpia
    if (rawParam) {
        updateUrlWithSearch(rawParam);
    }

    // Si es un hash ambiguo 
    if (q.startsWith('HASH:')) {
        const hash = q.substring(5);
        
        try {
            const blockTest = await fetch(`${API_URL}?token=${TOKEN}&cmd=getblock%20${hash}`);
            const blockData = await blockTest.json();
            
            if (blockData.result && blockData.result.hash) {
                return executeSearch(`getblock ${hash}`);
            }
        } catch(e) {}
        
        try {
            const txTest = await fetch(`${API_URL}?token=${TOKEN}&cmd=getrawtransaction%20${hash}%201`);
            const txData = await txTest.json();
            
            if (txData.result && txData.result.txid) {
                return executeSearch(`getrawtransaction ${hash} 1`);
            }
        } catch(e) {}
        
        out.innerHTML = `<pre>No se encontró bloque ni transacción con hash ${hash}</pre>`;
        return;
    }
    
    try {
        const r = await fetch(`${API_URL}?token=${TOKEN}&cmd=${encodeURIComponent(q)}`);
        const data = await r.json();
        
        let res = `<pre><span style="color:#9B1C2E;">firo> ${q}</span>\n\n`;
        
        if (data.error) {
            res += `error: ${JSON.stringify(data.error)}`;
        } 
        else if (q.includes('getblockhash') && typeof data.result === 'string') {
            const hash = data.result;
            executeSearch(`getblock ${hash}`);
            return;
        }
        else if (q.includes('getblock') && data.result?.hash) {
            const b = data.result;
            res += `BLOQUE #${b.height}\n`;
            res += `hash: ${b.hash}\n`;
            res += `fecha: ${new Date(b.time*1000).toLocaleString()}\n`;
            res += `transacciones: ${b.tx?.length || 0}\n`;
            res += `dificultad: ${b.difficulty?.toFixed(2)}\n`;
            if (b.previousblockhash) res += `anterior: ${b.previousblockhash}\n`;
            if (b.nextblockhash) res += `siguiente: ${b.nextblockhash}\n`;
            if (b.size) res += `tamaño: ${b.size} bytes\n`;
            
            if (b.tx && b.tx.length > 0) {
                res += `\n▶ TRANSACCIONES (${b.tx.length})\n`;
                b.tx.forEach((txid, i) => {
                    res += `  ${i+1}. ${txid}\n`;
                });
            }
        }
        else if (q.includes('getrawtransaction') && data.result?.txid) {
            const t = data.result;
            const moneda = 'FIRO';
            let totalIn = 0;
            let utxosGastados = 0;
            
            const esCoinbase = t.vin && t.vin[0]?.coinbase;
            const esSpark = t.type === 9 || t.vShieldedSpend?.length > 0 || t.vShieldedOutput?.length > 0 || t.sparkData;
            const esBlindada = t.vShieldedSpend?.length > 0 || t.vShieldedOutput?.length > 0;
            
            if (esSpark) {
                res += `🛡 TRANSACCIÓN SPARK (PRIVADA)\n`;
            } else if (esBlindada) {
                res += `🛡 TRANSACCIÓN PRIVADA (SHIELDED)\n`;
            } else if (esCoinbase) {
                res += `TRANSACCIÓN COINBASE (MINERÍA)\n`;
            } else {
                res += `📄 TRANSACCIÓN TRANSPARENTE\n`;
            }
            
            res += `TXID: ${t.txid}\n`;
            
            const blockHeight = t.blockheight || t.height || (t.blockhash ? 'consultar bloque' : 'no confirmada');
            res += `bloque: #${blockHeight}\n`;
            res += `confirmaciones: ${t.confirmations || 0}\n`;
            
            if (t.blocktime || t.time) {
                const ts = t.blocktime || t.time;
                res += `fecha: ${new Date(ts*1000).toLocaleString()}\n`;
            }
            
            res += `versión: ${t.version || 'N/A'}`;
            if (t.type !== undefined) res += ` | tipo: ${t.type}`;
            res += `\n`;
            
            if (t.size) res += `tamaño: ${t.size} bytes\n`;
            if (t.instantlock) res += `instantlock: sí\n`;
            if (t.chainlock) res += `chainlock: sí\n`;
            
            // ===== SPARK / SHIELDED =====
            if (esSpark || esBlindada) {
                res += `\n🛡 DATOS PRIVADOS (SPARK/SHIELDED)\n`;
                
                if (t.vShieldedSpend?.length > 0) {
                    res += `  spends blindados: ${t.vShieldedSpend.length}\n`;
                    t.vShieldedSpend.forEach((spend, i) => {
                        res += `    [#${i}] nullifier: ${spend.nullifier?.substring(0,16)}...\n`;
                        if (spend.nFees) res += `         fee: ${spend.nFees} FIRO\n`;
                    });
                }
                
                if (t.vShieldedOutput?.length > 0) {
                    res += `  outputs blindados: ${t.vShieldedOutput.length}\n`;
                }
                
                if (t.sparkData) {
                    const sparkLen = t.sparkData.length;
                    const realBytes = sparkLen / 2;
                    res += `  sparkData: ${realBytes} bytes (${sparkLen} hex)\n`;
                }
                
                if (t.vin && t.vin[0]?.lTags) {
                    res += `  lTags (nullifiers):\n`;
                    t.vin.forEach((vin, i) => {
                        if (vin.lTags && vin.lTags.length > 0) {
                            vin.lTags.forEach((tag, j) => {
                                const shortTag = tag.substring(0, 30) + '...' + tag.substring(tag.length-10);
                                res += `    [${i}.${j}] ${shortTag}\n`;
                            });
                        }
                    });
                }
                
                if (t.vin && t.vin[0]?.nFees) {
                    let totalFees = 0;
                    t.vin.forEach(vin => {
                        if (vin.nFees) totalFees += vin.nFees;
                    });
                    if (totalFees > 0) {
                        res += `  fees totales (Spark): ${totalFees.toFixed(8)} ${moneda}\n`;
                    }
                }
                
                if (t.version) {
                    res += `  version tx: ${t.version}`;
                    if (t.type !== undefined) {
                        res += ` (tipo ${t.type}${t.type === 9 ? ' - Spark' : ''})`;
                    }
                    res += `\n`;
                }
                
                if (t.chainlock) {
                    res += `  chainlock: 🔒 confirmado por red\n`;
                }
                
                if (t.bindingSig) {
                    res += `  bindingSig: ${t.bindingSig.substring(0, 128)}${t.bindingSig.length > 128 ? '...' : ''}\n`;
                }
                
                res += `  🔒 no existe vínculo criptográfico entre entradas y salidas\n`;
            }
            
            // ----- ENTRADAS TRANSPARENTES -----
            const entradasTransparentes = t.vin?.filter(vin => vin.txid) || [];
            if (entradasTransparentes.length > 0) {
                utxosGastados = entradasTransparentes.length;
                res += `\n▶ ENTRADAS TRANSPARENTES (${utxosGastados})\n`;
                totalIn = 0;
                
                const vinPromises = entradasTransparentes.map(async (vin, idx) => {
                    const shortTxid = vin.txid.substring(0, 6) + '...' + vin.txid.substring(vin.txid.length-6);
                    
                    let value = vin.value;
                    if (!value) {
                        value = await getVinValue(vin.txid, vin.vout);
                    }
                    
                    if (value) totalIn += value;
                    
                    const addrStr = vin.address ? ` (de ${vin.address.substring(0,12)}...${vin.address.substring(vin.address.length-6)})` : '';
                    const valStr = value ? ` ${value.toFixed(8)} ${moneda}` : '';
                    return `  [#${idx}] ${shortTxid}:${vin.vout}${valStr}${addrStr}`;
                });
                
                const vinLines = await Promise.all(vinPromises);
                res += vinLines.filter(line => line !== '').join('\n') + '\n';
                
                if (totalIn > 0) {
                    res += `  total entrada: ${totalIn.toFixed(8)} ${moneda}\n`;
                }
            } else if (t.vin && t.vin.length > 0 && !entradasTransparentes.length) {
                res += `\n▶ ENTRADAS PRIVADAS (${t.vin.length})\n`;
                t.vin.forEach((vin, i) => {
                    if (vin.scriptSig?.asm?.includes('OP_SPARKSPEND')) {
                        res += `  [#${i}] SPARK SPEND (entrada privada)\n`;
                    } else {
                        res += `  [#${i}] entrada privada\n`;
                    }
                });
            }
            
            // ----- SALIDAS -----
            if (t.vout && t.vout.length > 0) {
                const salidasTransparentes = t.vout.filter(vout => vout.value > 0 || !vout.scriptPubKey?.type?.includes('spark'));
                const salidasSpark = t.vout.filter(vout => vout.scriptPubKey?.type === 'sparksmint');
                
                if (salidasSpark.length > 0) {
                    res += `\n◀ SALIDAS SPARK (PRIVADAS: ${salidasSpark.length})\n`;
                    salidasSpark.forEach((vout, i) => {
                        res += `  [#${i}] SPARK MINT (nueva salida blindada)\n`;
                        if (vout.value === 0) {
                            res += `    valor oculto\n`;
                        } else {
                            res += `    ${vout.value.toFixed(8)} ${moneda}\n`;
                        }
                    });
                }
                
                if (salidasTransparentes.length > 0) {
                    res += `\n◀ SALIDAS TRANSPARENTES (${salidasTransparentes.length})\n`;
                    let totalOut = 0;
                    
                    salidasTransparentes.forEach((vout, i) => {
                        totalOut += vout.value || 0;
                        let addr = '';
                        
                        if (vout.scriptPubKey?.addresses?.[0]) {
                            addr = vout.scriptPubKey.addresses[0];
                        } else if (vout.scriptPubKey?.address) {
                            addr = vout.scriptPubKey.address;
                        } else {
                            addr = 'OP_RETURN/otro';
                        }
                        
                        const addrShort = addr.length > 40 ? addr.substring(0,12) + '...' + addr.substring(addr.length-6) : addr;
                        res += `  [#${i}] ${vout.value.toFixed(8)} ${moneda} → ${addrShort}\n`;
                    });
                    
                    if (totalOut > 0) {
                        res += `  total salida: ${totalOut.toFixed(8)} ${moneda}\n`;
                    }
                }
                
                // Fee solo para transacciones transparentes
                if (!esSpark && !esBlindada && !esCoinbase && totalIn > 0) {
                    const totalOut = t.vout.reduce((sum, vout) => sum + (vout.value || 0), 0);
                    const fee = totalIn - totalOut;
                    if (fee > 0) {
                        res += `\n  💸 FEE: ${fee.toFixed(8)} ${moneda}\n`;
                    }
                }
            }
            
            // Resumen final
            res += `\nRESUMEN:\n`;
            res += `   tipo: ${esSpark ? 'Spark (privado)' : esBlindada ? 'Shielded' : esCoinbase ? 'Coinbase' : 'Transparente'}\n`;
            res += `   entradas totales: ${t.vin?.length || 0} (${t.vin?.filter(v => v.txid).length || 0} transparentes, ${t.vin?.filter(v => !v.txid).length || 0} privadas)\n`;
            res += `   salidas totales: ${t.vout?.length || 0} (${t.vout?.filter(v => v.value > 0).length || 0} transparentes, ${t.vout?.filter(v => v.scriptPubKey?.type === 'sparksmint').length || 0} Spark)\n`;
        }
        // ===== VALIDACION DE DIRECCION =====
        else if (q.includes('validateaddress') && data.result) {
            const v = data.result;
            const direccion = v.address || q.split(' ')[1] || 'desconocida';
            
            res += `DIRECCIÓN\n`;
            res += `dirección: ${direccion}\n`;
            
            if (v.isvalidSpark !== undefined) {
                res += `válida (Spark): ${v.isvalidSpark ? 'sí' : 'no'}\n`;
                if (v.isvalidSpark) {
                    res += `tipo: shielded (Spark)\n`;
                }
            } else {
                res += `válida: ${v.isvalid ? 'sí' : 'no'}\n`;
                
                if (v.isvalid) {
                    let tipo = 'transparente';
                    if (v.isscript) tipo = 'script';
                    else if (v.iswatchonly) tipo = 'watchonly';
                    res += `tipo: ${tipo}\n`;
                    
                    if (v.scriptPubKey) {
                        res += `scriptPubKey: ${v.scriptPubKey}\n`;
                    }
                }
            }
            
            if (v.ismine !== undefined) {
                res += `pertenece a esta wallet: ${v.ismine ? 'sí' : 'no'}\n`;
            }
        }
        
        res += '</pre><br><br>'; 
        res += `<div>[F8 copiar] [F9 Limpiar]</div>`;
        
        res += `<div class="result-footer">\n===============================================================================\n`;
        res += `© 2026 Creada con ♥ por cΔrovΣr0 · apoya: carover0.firo\n</div>`;

        out.innerHTML = res;        
    } catch(e) {
        out.innerHTML = `<pre>error: ${e.message}</pre>`;
    }
    document.getElementById('searchInput').value = '';
}


// ========== TECLAS DE ACCESO RAPIDO ==========
document.addEventListener('keydown', function(e) {
    if (e.key === 'F8') {
        e.preventDefault();
        const outputPre = document.querySelector('#output pre');
        if (outputPre) {
            const textToCopy = outputPre.innerText;
            
            // Generar URL limpia para compartir
            const urlPagina = 'https://carover0.github.io/pagina/firo-explorer';
            const hashActual = document.getElementById('searchInput').value.trim();
            let urlCompleta = urlPagina;
            if (hashActual) {
                urlCompleta = urlPagina + '/' + encodeURIComponent(hashActual);
            }
            
            const textoCompleto = textToCopy + '\n\n—--\nExplorado con: https://carover0.github.io/pagina/firo-explorer.html';
            
            navigator.clipboard.writeText(textoCompleto).then(() => {
                const originalPrompt = document.querySelector('.prompt').innerHTML;
                document.querySelector('.prompt').innerHTML = '♥ COPIADO ♥';
                setTimeout(() => {
                    document.querySelector('.prompt').innerHTML = originalPrompt;
                }, 1000);
            });
        }
    }
    
    if (e.key === 'F9') {
        e.preventDefault();
        document.getElementById('searchInput').value = '';
        document.getElementById('output').innerHTML = '';
        document.getElementById('pie').style.display = 'block';
        loadNetworkStats();
        
        const baseUrl = window.location.origin + '/pagina/firo-explorer';
        window.history.replaceState({}, '', baseUrl);
        
        const originalPrompt = document.querySelector('.prompt').innerHTML;
        document.querySelector('.prompt').innerHTML = '♥ LIMPIADO ♥';
        setTimeout(() => {
            document.querySelector('.prompt').innerHTML = originalPrompt;
        }, 1000);
    }
});

// ========== EVENTOS ==========
const searchInput = document.getElementById('searchInput');

searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        e.preventDefault();
        const rawInput = searchInput.value.trim();
        if (rawInput) {
            const cmd = detectCommand(rawInput);
            executeSearch(cmd);
        }
    }
});

searchInput.addEventListener('paste', (e) => {
    setTimeout(() => {
        const input = searchInput.value;
        const cmd = detectCommand(input);
        if (cmd !== input) {
            searchInput.value = cmd;
        }
    }, 10);
});

// ========== DETECTAR DESDE URL ==========
(function() {
    const searchParam = detectSearchFromUrl();
    
    if (searchParam) {
        console.log('🔍 Buscando:', searchParam);
        window.addEventListener('load', function() {
            setTimeout(() => {
                const input = document.getElementById('searchInput');
                if (input) {
                    input.value = searchParam;
                    const cmd = detectCommand(searchParam);
                    executeSearch(cmd);
                }
            }, 500);
        });
    }
})();

// ========== INICIALIZACIÓN ==========
loadNetworkStats();
setInterval(loadNetworkStats, 30000);
</script>
