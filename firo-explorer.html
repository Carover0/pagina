<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firo · Explorador de Bloques</title>
  <style>
    :root { --gold:#9B1C2E; --gold-soft:#c0392b; --green:#31db72; --red:#ff756f; --line:rgba(155,28,46,.5); --panel:rgba(10,2,2,.91); --ui-scale:1; }
    * { box-sizing:border-box; }
    body { min-height:100vh; margin:0; color:#fff; font:14px/1.25 "Lucida Console",Monaco,monospace; background:#020105 url("assets/f6.png") center top/cover fixed no-repeat; }
    body::before { content:""; position:fixed; inset:0; z-index:-1; background:linear-gradient(90deg,rgba(0,0,0,.48),rgba(10,6,0,.13) 55%,rgba(0,0,0,.56)); }
    body::after { content:""; position:fixed; inset:0; pointer-events:none; background:repeating-linear-gradient(0deg,rgba(192,57,43,.025) 0 1px,transparent 1px 4px); }
    .brand { position:fixed; z-index:2; top:20px; left:50%; transform:translateX(-50%) scale(var(--ui-scale)); transform-origin:center top; color:var(--gold-soft); font-size:24px; letter-spacing:5px; text-shadow:0 0 16px var(--gold); }
    main { width:min(1380px,100%); min-height:100vh; margin:0; padding:72px 10px 36px 0; display:flex; align-items:center; justify-content:flex-start; transform:scale(var(--ui-scale)); transform-origin:top left; }
    .panel { position:relative; width:min(850px,98%); padding:25px 30px 20px; background:linear-gradient(135deg,rgba(30,10,5,.95),var(--panel)); border:3px solid var(--gold); clip-path:polygon(0 31px,31px 0,calc(100% - 31px) 0,100% 31px,100% calc(100% - 31px),calc(100% - 31px) 100%,31px 100%,0 calc(100% - 31px)); box-shadow:0 0 16px rgba(155,28,46,.85),0 0 48px rgba(155,28,46,.2),inset 0 0 30px rgba(155,28,46,.08); }
    .panel::before,.panel::after { content:""; position:absolute; width:62px; height:8px; background:repeating-linear-gradient(52deg,var(--gold) 0 11px,transparent 11px 18px); }
    .panel::before { top:17px; right:58px; } .panel::after { bottom:17px; left:80px; transform:scaleX(-1); }
    .panel-title { display:flex; align-items:center; gap:12px; margin:2px 0 16px; color:var(--gold-soft); font-size:17px; letter-spacing:1px; text-shadow:0 0 10px var(--gold); }
    .logo { width:36px; height:36px; object-fit:contain; filter:drop-shadow(0 0 7px rgba(192,57,43,.65)); }
    .top-links { border-top:1px solid var(--line); padding:8px 0; font-size:12px; line-height:1.6; }
    a { color:var(--gold-soft); text-decoration:none; } a:hover { text-decoration:underline; }
    .section { border-top:1px solid var(--line); padding:9px 0 10px; }
    .subheader { margin:0 0 5px; color:var(--gold-soft); font-size:12px; letter-spacing:.5px; text-transform:uppercase; }
    .note { color:var(--gold-soft); font-size:11px; line-height:1.4; }
    .api { font-size:11px; overflow-wrap:anywhere; } 
    .footer { border-top:1px solid var(--line); margin-top:2px; padding-top:9px; color:#e6ddce; font-size:11px; line-height:1.4; } 
    .small { color:#afa391; }
    .donation { font-size:10px; color:#7a7060; word-break:break-all; }
    
    .stats-row { display:flex; flex-wrap:wrap; gap:5px 18px; font-size:12px; margin-bottom:4px; color:#d2c8b7; }
    .stats-row span { color:#fff; }
    .stats-label { color:#d2c8b7; }
    .stats-value { color:#fff; }
    
    .input-line { display:flex; align-items:center; margin:8px 0; gap:8px; }
    .prompt { color:var(--gold-soft); font-size:13px; white-space:nowrap; }
    #searchInput { background:transparent; color:#fff; border:none; border-bottom:1px solid var(--line); font-family:"Lucida Console",Monaco,monospace; font-size:13px; padding:3px 5px; width:100%; outline:none; caret-color:var(--gold); }
    #searchInput:focus { border-bottom-color:var(--gold); }
    
    #output { margin-top:6px; }
    #output pre { margin:6px 0 0 0; font-family:"Lucida Console",Monaco,monospace; font-size:12px; white-space:pre-wrap; word-wrap:break-word; color:#e6ddce; line-height:1.5; }
    #output pre .gold { color:var(--gold-soft); }
    
    .result-footer { font-size:10px; color:#7a7060; margin-top:8px; padding-top:6px; border-top:1px solid var(--line); }
    
    .server-list-container { max-height:450px; overflow-y:auto; padding-right:5px; }
    .server-list-container::-webkit-scrollbar { width:3px; }
    .server-list-container::-webkit-scrollbar-track { background:rgba(155,28,46,.1); }
    .server-list-container::-webkit-scrollbar-thumb { background:var(--gold); border-radius:2px; }
    
    .copy-btn { background:transparent; border:1px solid var(--line); color:var(--gold-soft); font-family:'Lucida Console',monospace; font-size:11px; padding:3px 10px; cursor:pointer; margin-top:6px; }
    .copy-btn:hover { border-color:var(--gold); background:rgba(155,28,46,.1); }
    
    @media (max-width:700px) { 
      .brand { position:absolute; font-size:18px; letter-spacing:3px; } 
      main { padding:65px 10px 24px 5px; align-items:flex-start; } 
      .panel { padding:22px 18px 18px; width:98%; } 
      .panel-title { font-size:16px; } 
      .stats-row { font-size:11px; gap:3px 12px; }
      #searchInput { font-size:12px; }
      #output pre { font-size:11px; }
      .server-list-container { max-height:300px; }
    }
    @media (min-width:1920px) { 
      :root { --ui-scale:1.1; } 
      main { padding:72px 20px 36px 0; } 
      .panel { width:min(750px,90%); } 
    }
  </style>
</head>
<body>
  <div class="brand">cΔrovΣr0</div>
  <main><section class="panel">
    <div class="panel-title"><img class="logo" src="assets/firo.png" alt="Firo">EXPLORADOR DE BLOQUES</div>
    <nav class="top-links"><a href="https://carover0.github.io/pagina/firo-nodo">[NODO]</a> · <a href="https://carover0.github.io/pagina/firo-consola">[CONSOLA]</a> · <a href="https://carover0.github.io/pagina/">[INICIO]</a></nav>
    
    <section class="section">
      <div class="stats-row">
        <span><span class="stats-label">ALTURA:</span> <span class="stats-value" id="stat-height">---</span></span>
        <span><span class="stats-label">DIFICULTAD:</span> <span class="stats-value" id="stat-difficulty">---</span></span>
        <span><span class="stats-label">CONEXIONES:</span> <span class="stats-value" id="stat-connections">---</span></span>
        <span><span class="stats-label">MEMPOOL:</span> <span class="stats-value" id="stat-mempool">---</span> tx</span>
      </div>
      
      <div class="input-line">
        <span class="prompt">►</span>
        <input type="text" id="searchInput" placeholder="bloque / hash / txid / dirección" autofocus>
      </div>
      
      <div id="output" class="server-list-container"></div>
    </section>

    <section class="section"><h2 class="subheader">► API pública</h2>
      <a class="api" href="https://carover0.xyz/api/firo/rpc.php?token=firo2026" target="_blank" rel="noopener">https://carover0.xyz/api/firo/rpc.php?token=firo2026</a>
    </section>

    <footer class="footer">
      <div class="small">[F8] copiar &nbsp;·&nbsp; [F9] limpiar</div>
      <div class="donation"><br></div>
    </footer>
  </section></main>

  <script>
    const API_URL = "https://carover0.xyz/api/firo/rpc.php";
    const TOKEN = "firo2026";
    const STATUS_URL = "https://carover0.xyz/api/firo.json";

    function escapeHtml(text) {
      if (!text) return '';
      return String(text).replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    function detectSearchFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      const queryParam = urlParams.get('q');
      if (queryParam) return queryParam;
      const path = window.location.pathname;
      const match = path.match(/\/firo-explorer\/(.+)$/);
      if (match && match[1]) return match[1];
      return null;
    }

    function updateUrlWithSearch(parametro) {
      const basePath = window.location.origin + '/pagina';
      const newUrl = basePath + '/firo-explorer/' + encodeURIComponent(parametro);
      window.history.replaceState({}, '', newUrl);
    }

    function detectCommand(input) {
      input = input.trim();
      if (input.startsWith('getblock') || input.startsWith('getrawtransaction') || 
          input.startsWith('validateaddress') || input.startsWith('getaddressbalance') ||
          input.startsWith('HASH:')) {
        return input;
      }
      if (/^\d+$/.test(input)) return `getblockhash ${input}`;
      if (/^[a-fA-F0-9]{64}$/.test(input)) return `HASH:${input}`;
      if (/^[Ff][a-zA-Z0-9]{33,34}$/.test(input) || /^[aA][a-zA-Z0-9]{33,34}$/.test(input)) {
        return `validateaddress ${input}`;
      }
      if (input.length > 50) {
        if (input.startsWith('validateaddress')) return input;
        return `validateaddress ${input}`;
      }
      return input;
    }

    async function loadNetworkStats() {
      try {
        const r = await fetch(STATUS_URL);
        const d = await r.json();
        document.getElementById('stat-height').textContent = d.blockchain?.blocks?.toLocaleString() || '---';
        document.getElementById('stat-difficulty').textContent = d.blockchain?.difficulty?.toFixed(2) || '---';
        document.getElementById('stat-connections').textContent = d.network?.connections || '---';
        document.getElementById('stat-mempool').textContent = d.mempool?.txcount || '0';
      } catch(e) {}
    }

    async function getVinValue(txid, vout) {
      try {
        const r = await fetch(`${API_URL}?token=${TOKEN}&cmd=getrawtransaction%20${txid}%201`);
        const data = await r.json();
        if (data.result && data.result.vout && data.result.vout[vout]) {
          return data.result.vout[vout].value;
        }
        return null;
      } catch(e) { return null; }
    }

    async function executeSearch(q) {
      const out = document.getElementById('output');
      out.innerHTML = '<pre style="color:#888;">ejecutando...</pre>';

      let rawParam = '';
      
      if (q.startsWith('getblock ')) rawParam = q.replace('getblock ', '');
      else if (q.startsWith('getblockhash ')) rawParam = q.replace('getblockhash ', '');
      else if (q.startsWith('getrawtransaction ')) rawParam = q.replace('getrawtransaction ', '').replace(' 1', '');
      else if (q.startsWith('validateaddress ') || q.startsWith('getaddressbalance ')) rawParam = q.split(' ')[1];
      else if (q.startsWith('HASH:')) rawParam = q.substring(5);
      else {
        if (/^\d+$/.test(q)) rawParam = q;
        else if (/^[a-fA-F0-9]{64}$/.test(q)) rawParam = q;
        else if (q.startsWith('F') || q.startsWith('a') || q.startsWith('A')) rawParam = q;
      }
      
      if (rawParam) updateUrlWithSearch(rawParam);

      if (q.startsWith('HASH:')) {
        const hash = q.substring(5);
        try {
          const blockTest = await fetch(`${API_URL}?token=${TOKEN}&cmd=getblock%20${hash}`);
          const blockData = await blockTest.json();
          if (blockData.result && blockData.result.hash) {
            return executeSearch(`getblock ${hash}`);
          }
        } catch(e) {}
        try {
          const txTest = await fetch(`${API_URL}?token=${TOKEN}&cmd=getrawtransaction%20${hash}%201`);
          const txData = await txTest.json();
          if (txData.result && txData.result.txid) {
            return executeSearch(`getrawtransaction ${hash} 1`);
          }
        } catch(e) {}
        out.innerHTML = `<pre style="color:var(--red);">No se encontró bloque ni transacción con hash ${escapeHtml(hash)}</pre>`;
        return;
      }
      
      try {
        const r = await fetch(`${API_URL}?token=${TOKEN}&cmd=${encodeURIComponent(q)}`);
        const data = await r.json();
        
        let res = `<pre style="color:#9B1C2E;">firo> ${escapeHtml(q)}</pre><pre style="color:#e6ddce;">\n`;
        
        if (data.error) {
          res += `error: ${JSON.stringify(data.error)}`;
        }
        else if (q.includes('getblockhash') && typeof data.result === 'string') {
          const hash = data.result;
          return executeSearch(`getblock ${hash}`);
        }
        else if (q.includes('getblock') && data.result?.hash) {
          const b = data.result;
          res += `BLOQUE #${b.height}\n`;
          res += `hash: ${b.hash}\n`;
          res += `fecha: ${new Date(b.time*1000).toLocaleString()}\n`;
          res += `transacciones: ${b.tx?.length || 0}\n`;
          res += `dificultad: ${b.difficulty?.toFixed(2)}\n`;
          if (b.previousblockhash) res += `anterior: ${b.previousblockhash}\n`;
          if (b.nextblockhash) res += `siguiente: ${b.nextblockhash}\n`;
          if (b.size) res += `tamaño: ${b.size} bytes\n`;
          
          if (b.tx && b.tx.length > 0) {
            res += `\n▶ TRANSACCIONES (${b.tx.length})\n`;
            b.tx.forEach((txid, i) => {
              res += `  ${i+1}. ${txid}\n`;
            });
          }
        }
        else if (q.includes('getrawtransaction') && data.result?.txid) {
          const t = data.result;
          const moneda = 'FIRO';
          let totalIn = 0;
          
          const esCoinbase = t.vin && t.vin[0]?.coinbase;
          const esSpark = t.type === 9 || t.vShieldedSpend?.length > 0 || t.vShieldedOutput?.length > 0 || t.sparkData;
          const esBlindada = t.vShieldedSpend?.length > 0 || t.vShieldedOutput?.length > 0;
          
          if (esSpark) {
            res += `🛡 TRANSACCIÓN SPARK (PRIVADA)\n`;
          } else if (esBlindada) {
            res += `🛡 TRANSACCIÓN PRIVADA (SHIELDED)\n`;
          } else if (esCoinbase) {
            res += `TRANSACCIÓN COINBASE (MINERÍA)\n`;
          } else {
            res += `📄 TRANSACCIÓN TRANSPARENTE\n`;
          }
          
          res += `TXID: ${t.txid}\n`;
          const blockHeight = t.blockheight || t.height || (t.blockhash ? 'consultar bloque' : 'no confirmada');
          res += `bloque: #${blockHeight}\n`;
          res += `confirmaciones: ${t.confirmations || 0}\n`;
          if (t.blocktime || t.time) {
            res += `fecha: ${new Date((t.blocktime || t.time)*1000).toLocaleString()}\n`;
          }
          res += `versión: ${t.version || 'N/A'}`;
          if (t.type !== undefined) res += ` | tipo: ${t.type}`;
          res += `\n`;
          if (t.size) res += `tamaño: ${t.size} bytes\n`;
          if (t.instantlock) res += `instantlock: sí\n`;
          if (t.chainlock) res += `chainlock: sí\n`;
          
          if (esSpark || esBlindada) {
            res += `\n🛡 DATOS PRIVADOS (SPARK/SHIELDED)\n`;
            if (t.vShieldedSpend?.length > 0) {
              res += `  spends blindados: ${t.vShieldedSpend.length}\n`;
              t.vShieldedSpend.forEach((spend, i) => {
                res += `    [#${i}] nullifier: ${spend.nullifier?.substring(0,16)}...\n`;
                if (spend.nFees) res += `         fee: ${spend.nFees} FIRO\n`;
              });
            }
            if (t.vShieldedOutput?.length > 0) {
              res += `  outputs blindados: ${t.vShieldedOutput.length}\n`;
            }
            if (t.sparkData) {
              const realBytes = t.sparkData.length / 2;
              res += `  sparkData: ${realBytes} bytes\n`;
            }
            if (t.vin && t.vin[0]?.lTags) {
              res += `  lTags (nullifiers):\n`;
              t.vin.forEach((vin, i) => {
                if (vin.lTags && vin.lTags.length > 0) {
                  vin.lTags.forEach((tag, j) => {
                    const shortTag = tag.substring(0, 30) + '...' + tag.substring(tag.length-10);
                    res += `    [${i}.${j}] ${shortTag}\n`;
                  });
                }
              });
            }
            if (t.vin && t.vin[0]?.nFees) {
              let totalFees = 0;
              t.vin.forEach(vin => { if (vin.nFees) totalFees += vin.nFees; });
              if (totalFees > 0) {
                res += `  fees totales (Spark): ${totalFees.toFixed(8)} ${moneda}\n`;
              }
            }
            if (t.bindingSig) {
              res += `  bindingSig: ${t.bindingSig.substring(0, 128)}${t.bindingSig.length > 128 ? '...' : ''}\n`;
            }
            res += `  🔒 no existe vínculo criptográfico entre entradas y salidas\n`;
          }
          
          const entradasTransparentes = t.vin?.filter(vin => vin.txid) || [];
          if (entradasTransparentes.length > 0) {
            res += `\n▶ ENTRADAS TRANSPARENTES (${entradasTransparentes.length})\n`;
            const vinPromises = entradasTransparentes.map(async (vin, idx) => {
              const shortTxid = vin.txid.substring(0, 6) + '...' + vin.txid.substring(vin.txid.length-6);
              let value = vin.value;
              if (!value) value = await getVinValue(vin.txid, vin.vout);
              if (value) totalIn += value;
              const valStr = value ? ` ${value.toFixed(8)} ${moneda}` : '';
              return `  [#${idx}] ${shortTxid}:${vin.vout}${valStr}`;
            });
            const vinLines = await Promise.all(vinPromises);
            res += vinLines.filter(line => line !== '').join('\n') + '\n';
            if (totalIn > 0) res += `  total entrada: ${totalIn.toFixed(8)} ${moneda}\n`;
          } else if (t.vin && t.vin.length > 0 && !entradasTransparentes.length) {
            res += `\n▶ ENTRADAS PRIVADAS (${t.vin.length})\n`;
            t.vin.forEach((vin, i) => {
              if (vin.scriptSig?.asm?.includes('OP_SPARKSPEND')) {
                res += `  [#${i}] SPARK SPEND\n`;
              } else {
                res += `  [#${i}] entrada privada\n`;
              }
            });
          }
          
          if (t.vout && t.vout.length > 0) {
            const salidasSpark = t.vout.filter(vout => vout.scriptPubKey?.type === 'sparksmint');
            const salidasTransparentes = t.vout.filter(vout => vout.value > 0 || vout.scriptPubKey?.type !== 'sparksmint');
            
            if (salidasSpark.length > 0) {
              res += `\n◀ SALIDAS SPARK (PRIVADAS: ${salidasSpark.length})\n`;
              salidasSpark.forEach((vout, i) => {
                res += `  [#${i}] SPARK MINT\n`;
                if (vout.value === 0) res += `    valor oculto\n`;
                else res += `    ${vout.value.toFixed(8)} ${moneda}\n`;
              });
            }
            
            if (salidasTransparentes.length > 0) {
              res += `\n◀ SALIDAS TRANSPARENTES (${salidasTransparentes.length})\n`;
              let totalOut = 0;
              salidasTransparentes.forEach((vout, i) => {
                totalOut += vout.value || 0;
                let addr = 'OP_RETURN/otro';
                if (vout.scriptPubKey?.addresses?.[0]) addr = vout.scriptPubKey.addresses[0];
                else if (vout.scriptPubKey?.address) addr = vout.scriptPubKey.address;
                const addrShort = addr.length > 40 ? addr.substring(0,12) + '...' + addr.substring(addr.length-6) : addr;
                res += `  [#${i}] ${vout.value.toFixed(8)} ${moneda} → ${addrShort}\n`;
              });
              if (totalOut > 0) res += `  total salida: ${totalOut.toFixed(8)} ${moneda}\n`;
            }
            
            if (!esSpark && !esBlindada && !esCoinbase && totalIn > 0) {
              const totalOut = t.vout.reduce((sum, vout) => sum + (vout.value || 0), 0);
              const fee = totalIn - totalOut;
              if (fee > 0) res += `\n  💸 FEE: ${fee.toFixed(8)} ${moneda}\n`;
            }
          }
          
          res += `\nRESUMEN:\n`;
          res += `   tipo: ${esSpark ? 'Spark (privado)' : esBlindada ? 'Shielded' : esCoinbase ? 'Coinbase' : 'Transparente'}\n`;
          res += `   entradas: ${t.vin?.length || 0}\n`;
          res += `   salidas: ${t.vout?.length || 0}\n`;
        }
        else if (q.includes('validateaddress') && data.result) {
          const v = data.result;
          const direccion = v.address || q.split(' ')[1] || 'desconocida';
          res += `DIRECCIÓN\n`;
          res += `dirección: ${direccion}\n`;
          if (v.isvalidSpark !== undefined) {
            res += `válida (Spark): ${v.isvalidSpark ? 'sí' : 'no'}\n`;
            if (v.isvalidSpark) res += `tipo: shielded (Spark)\n`;
          } else {
            res += `válida: ${v.isvalid ? 'sí' : 'no'}\n`;
            if (v.isvalid) {
              let tipo = 'transparente';
              if (v.isscript) tipo = 'script';
              else if (v.iswatchonly) tipo = 'watchonly';
              res += `tipo: ${tipo}\n`;
              if (v.scriptPubKey) res += `scriptPubKey: ${v.scriptPubKey}\n`;
            }
          }
          if (v.ismine !== undefined) res += `pertenece a esta wallet: ${v.ismine ? 'sí' : 'no'}\n`;
        }
        
        res += `\n\n</pre>`;
        res += `<button class="copy-btn" onclick="copyResult()">[F8] copiar resultado</button>`;
        res += `<div class="result-footer"><br></div>`;
        out.innerHTML = res;
        
      } catch(e) {
        out.innerHTML = `<pre style="color:var(--red);">error: ${escapeHtml(e.message)}</pre>`;
      }
      
      document.getElementById('searchInput').value = '';
    }

    window.copyResult = function() {
      const outputPre = document.querySelector('#output pre:last-of-type');
      if (outputPre) {
        navigator.clipboard.writeText(outputPre.innerText).then(() => {
          document.querySelector('.prompt').textContent = '✓';
          setTimeout(() => document.querySelector('.prompt').textContent = '►', 1000);
        });
      }
    };

    document.addEventListener('keydown', function(e) {
      if (e.key === 'F8') { e.preventDefault(); window.copyResult(); }
      if (e.key === 'F9') {
        e.preventDefault();
        document.getElementById('searchInput').value = '';
        document.getElementById('output').innerHTML = '';
        document.querySelector('.prompt').textContent = '♥';
        setTimeout(() => document.querySelector('.prompt').textContent = '►', 1000);
        const baseUrl = window.location.origin + '/pagina/firo-explorer';
        window.history.replaceState({}, '', baseUrl);
        loadNetworkStats();
      }
    });

    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const rawInput = searchInput.value.trim();
        if (rawInput) executeSearch(detectCommand(rawInput));
      }
    });
    searchInput.addEventListener('paste', () => {
      setTimeout(() => {
        const input = searchInput.value;
        const cmd = detectCommand(input);
        if (cmd !== input) searchInput.value = cmd;
      }, 10);
    });

    (function() {
      const searchParam = detectSearchFromUrl();
      if (searchParam) {
        window.addEventListener('load', function() {
          setTimeout(() => {
            const input = document.getElementById('searchInput');
            if (input) {
              input.value = searchParam;
              executeSearch(detectCommand(searchParam));
            }
          }, 500);
        });
      }
    })();

    loadNetworkStats();
    setInterval(loadNetworkStats, 30000);
  </script>
</body>
</html>
