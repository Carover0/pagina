<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=.9">
    <title>cΔrovΣr0 · Reactores Tron</title>
<style>
        :root { --cyan: #00d9ff; --green: #31db72; --panel: rgba(1,14,19,.91); --line: rgba(0,217,255,.45); }
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; color: var(--green); font-family: "Lucida Console", "Monaco", monospace; background: #02070a url('assets/f5.png') 75% center / cover fixed no-repeat; }
        .brand { position: fixed; z-index: 3; top: 18px; left: 50%; transform: translateX(-50%) scale(var(--ui-scale)); transform-origin: center top; color: var(--cyan); font-size: clamp(20px, 2vw, 30px); font-weight: bold; letter-spacing: 5px; text-shadow: 0 0 18px var(--cyan); font-family: "Lucida Console", "Monaco", monospace; }
        main { width: min(1100px, 100%); height: 100vh; margin: auto; padding: 76px 10px 46px; display: flex; justify-content: center; align-items: flex-end; transform: scale(var(--ui-scale)); transform-origin: top center; }
        .panel { position: relative; z-index: 1; width: 82%; max-width: 770px; margin-top: 600px; margin-left: -6.5cm; padding: 28px 32px 22px; background: linear-gradient(135deg, rgba(2,20,27,.94), var(--panel)); border: 3px solid var(--cyan); clip-path: polygon(0 31px, 31px 0, calc(100% - 31px) 0, 100% 31px, 100% calc(100% - 31px), calc(100% - 31px) 100%, 31px 100%, 0 calc(100% - 31px)); box-shadow: 0 0 15px rgba(0,217,255,.9), 0 0 45px rgba(0,217,255,.18), inset 0 0 26px rgba(0,217,255,.06); transform: translateX(-50px); }
        .panel::before, .panel::after { content: ""; position: absolute; width: 62px; height: 8px; background: repeating-linear-gradient(52deg, var(--cyan) 0 11px, transparent 11px 18px); }
        .panel::before { top: 17px; right: 58px; }
        .panel::after { bottom: 17px; left: 80px; transform: scaleX(-1); }
        h2 { margin: 4px 0 14px; color: var(--cyan); font-size: 18px; font-weight: normal; letter-spacing: 2px; text-shadow: 0 0 10px var(--cyan); }
        .section { border-top: 1px solid var(--line); padding: 10px 0 12px; }
        .metric-name { display: block; margin-bottom: 6px; color: var(--cyan); font-size: 12px; }
        .info { font-size: 12px; line-height: 1.4; }
        .status { letter-spacing: 1px; }
        .bar-line { display: flex; align-items: center; gap: 9px; }
        .bar { display: flex; flex: 1; gap: 3px; }
        .bar i { display: block; width: 10px; height: 12px; border: 1px solid rgba(49,219,114,.24); background: rgba(49,219,114,.06); }
        .bar i.on { background: #32d772; box-shadow: 0 0 8px rgba(49,219,114,.42); border-color: #32d772; }
        .bar i.on.bw { background: #00d9ff; box-shadow: 0 0 8px rgba(0,217,255,.42); border-color: #00d9ff; }
        .percent { min-width: 35px; font-size: 12px; }
        .node-title { display: flex; align-items: center; gap: 10px; color: var(--cyan); font-size: 13px; margin-bottom: 6px; }
        .online { margin-left: auto; font-size: 11px; color: var(--green); }
        .links { text-align: center; color: #b8fff0; font-size: 13px; text-shadow: 0 1px 3px #000; padding: 6px 0 0; }
        .links a { color: var(--cyan); text-decoration: none; }
        .links a:hover { text-decoration: underline; }
        .reactor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .footer-info { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 4px; font-size: 12px; }
        .energy-detail { font-size: 11px; color: #6a8faa; margin-top: 2px; }
        @media (max-width: 1024px) { 
            main { padding: 72px 15px 28px; } 
            .panel { width: 95%; max-width: 100%; padding: 24px 20px 18px; margin-top: 420px; margin-left: 0; } 
            .reactor-grid { grid-template-columns: 1fr; gap: 15px; } 
            .footer-info { grid-template-columns: 1fr; text-align: center; } 
            .links { font-size: 12px; } 
        }
    </style>
<body>
    <div class="brand">cΔrovΣr0</div>
    <main>
        <section class="panel">
            <h2>☢️ REACTORES TRON</h2>
            <div class="reactor-grid">
                <div>
                    <div class="node-title"><span>⚛️ R1</span><span class="online" id="r1-status">CONECTANDO...</span></div>
                    <div class="section" style="border-top:none;padding-top:0;">
                        <span class="metric-name">⚡ ENERGIA BRUTA</span>
                        <div class="bar-line"><div class="bar" id="r1-energy-bar"></div><span class="percent" id="r1-energy-percent">—</span></div>
                        <div class="info" id="r1-energy-total" style="font-size:12px;color:#b8aacc;margin-top:3px;">—</div>
                        <div class="energy-detail" id="r1-energy-detail">—</div>
                        <span class="metric-name" style="margin-top:8px;">📶 BANDWIDTH</span>
                        <div class="bar-line"><div class="bar" id="r1-bandwidth-bar"></div><span class="percent" id="r1-bandwidth-percent">—</span></div>
                        <div class="info" id="r1-bandwidth-total" style="font-size:12px;color:#b8aacc;margin-top:3px;">—</div>
                    </div>
                </div>
                <div>
                    <div class="node-title"><span>⚛️ R2</span><span class="online" id="r2-status">CONECTANDO...</span></div>
                    <div class="section" style="border-top:none;padding-top:0;">
                        <span class="metric-name">⚡ ENERGIA BRUTA</span>
                        <div class="bar-line"><div class="bar" id="r2-energy-bar"></div><span class="percent" id="r2-energy-percent">—</span></div>
                        <div class="info" id="r2-energy-total" style="font-size:12px;color:#b8aacc;margin-top:3px;">—</div>
                        <div class="energy-detail" id="r2-energy-detail">—</div>
                        <span class="metric-name" style="margin-top:8px;">📶 BANDWIDTH</span>
                        <div class="bar-line"><div class="bar" id="r2-bandwidth-bar"></div><span class="percent" id="r2-bandwidth-percent">—</span></div>
                        <div class="info" id="r2-bandwidth-total" style="font-size:12px;color:#b8aacc;margin-top:3px;">—</div>
                    </div>
                </div>
            </div>
            <div class="footer-info">
                <div><span class="metric-name" style="display:inline;">⏱ </span><span class="info" id="last-update" style="display:inline;color:var(--cyan);">—</span><span class="info" id="update-timer" style="display:inline;color:var(--cyan);margin-left:10px;font-size:11px;">(siguiente: 30s)</span></div>
                <div style="text-align:right;"><span class="metric-name" style="display:inline;"></span><span class="info status" id="global-status" style="display:inline;color:var(--green);">INICIALIZANDO...</span></div>
            </div>
            <div class="links"><a href="https://carover0.github.io/pagina/" target="_self">[INICIO]</a></div>
        </section>
    </main>
    <script>
        const TRONSCAN_KEY = 'eba0f317-25ee-4027-bff9-a692fecbd85f';
        const R1_ADDRESS = 'TS1k7yVS6PLNRP3xSms65YVa5sARj2JgVd';
        const R2_ADDRESS = 'TN8tyafAodF5Yez4yuKv6QqvycQoMPYt2D';
        const UPDATE_INTERVAL = 30000;

        function $(id){ return document.getElementById(id); }

        function formatNumInt(num) {
            if(num === undefined || num === null || isNaN(num) || num === 0) return '0';
            if(num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
            if(num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
            if(num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
            return Math.round(num).toString();
        }

        function setBar(barId, available, total, isBandwidth = false) {
            const bar = document.getElementById(barId);
            if(!bar) return 0;
            const percent = total > 0 ? Math.min(100, Math.round((available / total) * 100)) : 0;
            const segments = 10;
            const filled = Math.round((percent / 100) * segments);
            bar.innerHTML = '';
            for(let i = 0; i < segments; i++) {
                const segment = document.createElement('i');
                if(i < filled) {
                    if(isBandwidth) segment.className = 'on bw';
                    else segment.className = 'on';
                }
                bar.appendChild(segment);
            }
            return percent;
        }

        function safeValue(val, defaultValue = 0) {
            if (val === undefined || val === null || isNaN(val)) return defaultValue;
            return val;
        }

        async function getDelegatedResources(address, resourceType = 2) { // 2 = energy
            try {
                let allDelegations = [];
                let start = 0;
                const limit = 100;
                let hasMore = true;

                while (hasMore) {
                    const url = `https://apilist.tronscan.org/api/account/resourcev2?address=${address}&start=${start}&limit=${limit}&type=2&resourceType=${resourceType}`;
                    
                    const response = await fetch(url, {
                        headers: { 'TRON-PRO-API-KEY': TRONSCAN_KEY }
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const data = await response.json();
                    
                    if (data.data && data.data.length > 0) {
                        allDelegations = allDelegations.concat(data.data);
                        start += limit;
                        if (start >= data.total) {
                            hasMore = false;
                        }
                    } else {
                        hasMore = false;
                    }
                }

                let totalDelegatedEnergy = 0;
                let delegationDetails = [];
                
                allDelegations.forEach(item => {
                    const resourceValue = safeValue(item.resourceValue);
                    const receiverAddress = item.receiverAddress || 'unknown';
                    totalDelegatedEnergy += resourceValue;
                    delegationDetails.push({
                        to: receiverAddress,
                        value: resourceValue
                    });
                });

                return {
                    total: totalDelegatedEnergy,
                    details: delegationDetails,
                    count: allDelegations.length
                };
            } catch (e) {
                console.error('Error obteniendo delegaciones:', e);
                return { total: 0, details: [], count: 0 };
            }
        }

        async function fetchReactorData(address, prefix) {
            try {
                const urlDetail = `https://apilist.tronscan.org/api/accountv2?address=${address}`;
                const responseDetail = await fetch(urlDetail, {
                    headers: { 'TRON-PRO-API-KEY': TRONSCAN_KEY }
                });

                if (!responseDetail.ok) {
                    throw new Error(`HTTP error! status: ${responseDetail.status}`);
                }

                const data = await responseDetail.json();

                const delegatedData = await getDelegatedResources(address, 2);
                const totalDelegatedEnergy = delegatedData.total;

                const get = (field) => safeValue(data[field]);

                // ─── ENERGÍA ─────────────────────────────────────────
                const selfEnergyV2 = get('frozenForEnergyV2Value');
                const selfEnergyV1 = get('frozenForEnergyValue');
                const selfEnergyTotal = selfEnergyV2 + selfEnergyV1;

                // Delegaciones recibidas de otros
                const acquiredEnergyV2 = get('acquiredDelegatedFrozenV2BalanceForEnergyValue');
                const acquiredEnergyV1 = get('acquiredDelegatedFrozenBalanceForEnergyValue');
                const acquiredEnergyTotal = acquiredEnergyV2 + acquiredEnergyV1;

                // Energía bruta total = propia + recibida + delegada (enviada)
                const energiaBruta = selfEnergyTotal + acquiredEnergyTotal + totalDelegatedEnergy;

                // Energía disponible (de la API)
                const energyDisponible = get('totalEnergyRemaining');
                const energyUsado = energiaBruta - energyDisponible;

                // ─── BANDWIDTH ──────────────────────────────────────
                const totalNet = get('totalNet');
                const netRemaining = get('totalNetRemaining');

                // ─── ACTUALIZAR UI ─────────────────────────────────
                // Barra de energía
                const energyPercent = setBar(`${prefix}-energy-bar`, energyDisponible, energiaBruta, false);
                $(`${prefix}-energy-percent`).textContent = energiaBruta > 0 ? `${energyPercent}%` : "0%";
                
                $(`${prefix}-energy-total`).textContent = `⚡ ${formatNumInt(energiaBruta)} BRUTA · ${formatNumInt(energyDisponible)} DISPONIBLE`;
                
                let detailParts = [];
                if (selfEnergyTotal > 0) {
                    detailParts.push(`Actual: ${formatNumInt(selfEnergyTotal)}`);
                }
                if (acquiredEnergyTotal > 0) {
                    detailParts.push(`Recibido: ${formatNumInt(acquiredEnergyTotal)}`);
                }
                if (totalDelegatedEnergy > 0) {
                    detailParts.push(`Delegado: ${formatNumInt(totalDelegatedEnergy)} (${delegatedData.count} destinos)`);
                }
                
                $(`${prefix}-energy-detail`).textContent = detailParts.length > 0 ? detailParts.join(' · ') : 'Sin staking activo';

                // Barra de bandwidth
                const bandwidthPercent = setBar(`${prefix}-bandwidth-bar`, netRemaining, totalNet, true);
                $(`${prefix}-bandwidth-percent`).textContent = totalNet > 0 ? `${bandwidthPercent}%` : "0%";
                $(`${prefix}-bandwidth-total`).textContent = `📶 ${formatNumInt(totalNet)} BRUTA · ${formatNumInt(netRemaining)} DISPONIBLE`;

                // ─── ACTUALIZAR ESTADO ─────────────────────────────
                $(`${prefix}-status`).textContent = "✅ ONLINE";
                $(`${prefix}-status`).style.color = "#31db72";
                
                return { success: true };
            } catch(e) {
                console.error(`❌ Error en ${prefix}:`, e);
                $(`${prefix}-status`).textContent = "⚠️ OFFLINE";
                $(`${prefix}-status`).style.color = "#ff7b87";
                return { success: false };
            }
        }

        let countdown = UPDATE_INTERVAL / 1000;
        let timerInterval = null;

        function updateTimerDisplay() {
            const timerElement = document.getElementById('update-timer');
            if(timerElement) timerElement.textContent = `(siguiente: ${countdown}s)`;
        }

        function startCountdown() {
            countdown = UPDATE_INTERVAL / 1000;
            updateTimerDisplay();
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                countdown--;
                if(countdown <= 0) countdown = UPDATE_INTERVAL / 1000;
                updateTimerDisplay();
            }, 1000);
        }

        let isUpdating = false;

        async function updateReactors() {
            if(isUpdating) return;
            isUpdating = true;
            const statusElement = document.getElementById('global-status');
            statusElement.textContent = '🔄 ACTUALIZANDO...';
            statusElement.style.color = '#ffd700';
            
            try {
                await Promise.all([
                    fetchReactorData(R1_ADDRESS, 'r1'),
                    fetchReactorData(R2_ADDRESS, 'r2')
                ]);
                
                document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
                statusElement.textContent = '🟢 SISTEMA OPERATIVO';
                statusElement.style.color = '#31db72';
                startCountdown();
            } catch(error) {
                console.error('Error en actualización:', error);
                statusElement.textContent = '⚠️ ERROR DE ACTUALIZACIÓN';
                statusElement.style.color = '#ff7b87';
            } finally {
                isUpdating = false;
            }
        }

        async function initReactors() {
            await updateReactors();
            setInterval(updateReactors, UPDATE_INTERVAL);
        }

        document.addEventListener('DOMContentLoaded', initReactors);
    </script>
</body>
</html>
