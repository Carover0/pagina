<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIVX · Explorador de Bloques</title>
  <style>
    :root { --gold:#A044FF; --gold-soft:#b86bff; --green:#31db72; --red:#ff756f; --line:rgba(160,68,255,.5); --panel:rgba(16,6,26,.91); --ui-scale:1; }
    * { box-sizing:border-box; }
    body { min-height:100vh; margin:0; color:#fff; font:14px/1.25 "Lucida Console",Monaco,monospace; background:#020105 url("assets/f6.png") center top/cover fixed no-repeat; }
    body::before { content:""; position:fixed; inset:0; z-index:-1; background:linear-gradient(90deg,rgba(0,0,0,.48),rgba(10,6,0,.13) 55%,rgba(0,0,0,.56)); }
    body::after { content:""; position:fixed; inset:0; pointer-events:none; background:repeating-linear-gradient(0deg,rgba(160,68,255,.025) 0 1px,transparent 1px 4px); }
    .brand { position:fixed; z-index:2; top:20px; left:50%; transform:translateX(-50%) scale(var(--ui-scale)); transform-origin:center top; color:var(--gold-soft); font-size:24px; letter-spacing:5px; text-shadow:0 0 16px var(--gold); }
    main { width:min(1380px,100%); min-height:100vh; margin:0; padding:72px 10px 36px 0; display:flex; align-items:center; justify-content:flex-start; transform:scale(var(--ui-scale)); transform-origin:top left; }
    .panel { position:relative; width:min(800px,98%); padding:25px 30px 20px; background:linear-gradient(135deg,rgba(30,16,50,.95),var(--panel)); border:3px solid var(--gold); clip-path:polygon(0 31px,31px 0,calc(100% - 31px) 0,100% 31px,100% calc(100% - 31px),calc(100% - 31px) 100%,31px 100%,0 calc(100% - 31px)); box-shadow:0 0 16px rgba(160,68,255,.85),0 0 48px rgba(160,68,255,.2),inset 0 0 30px rgba(160,68,255,.08); }
    .panel::before,.panel::after { content:""; position:absolute; width:62px; height:8px; background:repeating-linear-gradient(52deg,var(--gold) 0 11px,transparent 11px 18px); }
    .panel::before { top:17px; right:58px; } .panel::after { bottom:17px; left:80px; transform:scaleX(-1); }
    .panel-title { display:flex; align-items:center; gap:12px; margin:2px 0 16px; color:var(--gold-soft); font-size:17px; letter-spacing:1px; text-shadow:0 0 10px var(--gold); }
    .logo { width:36px; height:36px; object-fit:contain; filter:drop-shadow(0 0 7px rgba(160,68,255,.65)); }
    .top-links { border-top:1px solid var(--line); padding:8px 0; font-size:12px; line-height:1.6; }
    a { color:var(--gold-soft); text-decoration:none; } a:hover { text-decoration:underline; }
    .section { border-top:1px solid var(--line); padding:9px 0 10px; }
    .subheader { margin:0 0 5px; color:var(--gold-soft); font-size:12px; letter-spacing:.5px; text-transform:uppercase; }
    .note { color:var(--gold-soft); font-size:11px; line-height:1.4; }
    .api { font-size:11px; overflow-wrap:anywhere; } 
    .footer { border-top:1px solid var(--line); margin-top:2px; padding-top:9px; color:#e6ddce; font-size:11px; line-height:1.4; } 
    .small { color:#afa391; }
    .donation { font-size:10px; color:#7a7060; word-break:break-all; }
    
    .stats-row { display:flex; flex-wrap:wrap; gap:5px 18px; font-size:12px; margin-bottom:4px; color:#d2c8b7; }
    .stats-row span { color:#fff; }
    .stats-label { color:#d2c8b7; }
    .stats-value { color:#fff; }
    
    .input-line { display:flex; align-items:center; margin:8px 0; gap:8px; }
    .prompt { color:var(--gold-soft); font-size:13px; white-space:nowrap; }
    #searchInput { background:transparent; color:#fff; border:none; border-bottom:1px solid var(--line); font-family:"Lucida Console",Monaco,monospace; font-size:13px; padding:3px 5px; width:100%; outline:none; caret-color:var(--gold); }
    #searchInput:focus { border-bottom-color:var(--gold); }
    
    #output { margin-top:6px; }
    #output pre { margin:6px 0 0 0; font-family:"Lucida Console",Monaco,monospace; font-size:12px; white-space:pre-wrap; word-wrap:break-word; color:#e6ddce; line-height:1.5; }
    #output pre .gold { color:var(--gold-soft); }
    
    .result-footer { font-size:10px; color:#7a7060; margin-top:8px; padding-top:6px; border-top:1px solid var(--line); }
    
    .server-list-container { max-height:450px; overflow-y:auto; padding-right:5px; }
    .server-list-container::-webkit-scrollbar { width:3px; }
    .server-list-container::-webkit-scrollbar-track { background:rgba(160,68,255,.1); }
    .server-list-container::-webkit-scrollbar-thumb { background:var(--gold); border-radius:2px; }
    
    .copy-btn { background:transparent; border:1px solid var(--line); color:var(--gold-soft); font-family:'Lucida Console',monospace; font-size:11px; padding:3px 10px; cursor:pointer; margin-top:6px; }
    .copy-btn:hover { border-color:var(--gold); background:rgba(160,68,255,.1); }
    
    @media (max-width:700px) { 
      .brand { position:absolute; font-size:18px; letter-spacing:3px; } 
      main { padding:65px 10px 24px 5px; align-items:flex-start; } 
      .panel { padding:22px 18px 18px; width:98%; } 
      .panel-title { font-size:16px; } 
      .stats-row { font-size:11px; gap:3px 12px; }
      #searchInput { font-size:12px; }
      #output pre { font-size:11px; }
      .server-list-container { max-height:300px; }
    }
    @media (min-width:1920px) { 
      :root { --ui-scale:1.1; } 
      main { padding:72px 20px 36px 0; } 
      .panel { width:min(750px,90%); } 
    }
  </style>
</head>
<body>
  <div class="brand">cΔrovΣr0</div>
  <main><section class="panel">
    <div class="panel-title"><img class="logo" src="assets/pivx.png" alt="PIVX">EXPLORADOR DE BLOQUES</div>
    <nav class="top-links"><a href="https://carover0.github.io/pagina/pivx-nodo.html">[NODO]</a> · <a href="https://carover0.github.io/pagina/pivx-consola.html">[CONSOLA]</a> · <a href="https://carover0.github.io/pagina/">[INICIO]</a></nav>
    
    <section class="section">
      <div class="stats-row">
        <span><span class="stats-label">ALTURA:</span> <span class="stats-value" id="stat-height">---</span></span>
        <span><span class="stats-label">CONEXIONES:</span> <span class="stats-value" id="stat-connections">---</span></span>
        <span><span class="stats-label">MEMPOOL:</span> <span class="stats-value" id="stat-mempool">---</span> tx</span>
      </div>
      
      <div class="input-line">
        <span class="prompt">►</span>
        <input type="text" id="searchInput" placeholder="bloque / hash / txid / dirección" autofocus>
      </div>
      
      <div id="output" class="server-list-container"></div>
    </section>

    <section class="section"><h2 class="subheader">► API pública</h2>
      <a class="api" href="https://carover0.xyz/api/pivx/pivx.php?token=pivx2026" target="_blank" rel="noopener">https://carover0.xyz/api/pivx/pivx.php?token=pivx2026</a>
    </section>

    <footer class="footer">
      <div class="small">[F8] copiar &nbsp;·&nbsp; [F9] limpiar</div>
      <div class="donation"><br></div>
    </footer>
  </section></main>

  <script>
    const API_URL = "https://carover0.xyz/api/pivx/pivx.php";
    const TOKEN = "pivx2026";
    const STATUS_URL = "https://carover0.xyz/cacaX/pivx_status_X.json";

    function escapeHtml(text) {
      if (!text) return '';
      return String(text).replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    function formatTxid(txid) {
      if (!txid || txid.length < 20) return txid;
      return txid.substring(0, 12) + '...' + txid.substring(txid.length - 12);
    }

    function formatAddress(addr) {
      if (!addr || addr.length < 20) return addr;
      return addr.substring(0, 10) + '...' + addr.substring(addr.length - 8);
    }

    function detectSearchFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      const queryParam = urlParams.get('q');
      if (queryParam) return queryParam;
      const path = window.location.pathname;
      const match = path.match(/\/pivx-explorer\/(.+)$/);
      if (match && match[1]) return match[1];
      return null;
    }

    function updateUrlWithSearch(parametro) {
      const newUrl = window.location.origin + '/pagina/pivx-explorer/' + encodeURIComponent(parametro);
      window.history.replaceState({}, '', newUrl);
    }

    async function detectCommand(input) {
      input = input.trim();
      if (input.startsWith('getblock ') || input.startsWith('getrawtransaction ') || 
          input.startsWith('validateaddress ') || input.startsWith('getblockhash ')) {
        return input;
      }
      if (/^\d+$/.test(input)) {
        try {
          const url = `${API_URL}?token=${TOKEN}&cmd=getblockhash ${input}`;
          const response = await fetch(url);
          const data = await response.json();
          if (data.result) return `getblock ${data.result}`;
        } catch(e) {}
        return `getblock ${input}`;
      }
      if (/^[a-fA-F0-9]{64}$/.test(input)) {
        try {
          const blockCheckUrl = `${API_URL}?token=${TOKEN}&cmd=getblock ${input}`;
          const blockResponse = await fetch(blockCheckUrl);
          const blockData = await blockResponse.json();
          if (blockData.result && !blockData.error) return `getblock ${input}`;
          return `getrawtransaction ${input} 1`;
        } catch (error) {
          return `getrawtransaction ${input} 1`;
        }
      }
      if (input.startsWith('D') && input.length === 34) return `validateaddress ${input}`;
      if (input.startsWith('p') && input.length === 78) return `validateaddress ${input}`;
      if (input.startsWith('z') && input.length > 50) return `validateaddress ${input}`;
      return input;
    }

    async function loadNetworkStats() {
      try {
        const r = await fetch(STATUS_URL);
        const d = await r.json();
        document.getElementById('stat-height').textContent = d.height?.toLocaleString() || '---';
        document.getElementById('stat-connections').textContent = d.connections || '---';
        document.getElementById('stat-mempool').textContent = d.mempool || '0';
      } catch(e) {}
    }

    async function getVinValue(txid, voutIndex) {
      try {
        const url = `${API_URL}?token=${TOKEN}&cmd=getrawtransaction ${txid} 1`;
        const response = await fetch(url);
        const data = await response.json();
        if (data.result && data.result.vout && data.result.vout[voutIndex]) {
          return data.result.vout[voutIndex].value;
        }
      } catch(e) {}
      return null;
    }

    async function executeSearch(q) {
      const out = document.getElementById('output');
      out.innerHTML = '<pre style="color:#888;">ejecutando...</pre>';

      let rawParam = '';
      if (q.startsWith('getblock ')) rawParam = q.replace('getblock ', '');
      else if (q.startsWith('getrawtransaction ')) rawParam = q.replace('getrawtransaction ', '').replace(' 1', '');
      else if (q.startsWith('validateaddress ')) rawParam = q.split(' ')[1];
      else {
        if (/^[a-fA-F0-9]{64}$/.test(q)) rawParam = q;
        else if (/^\d+$/.test(q)) rawParam = q;
        else if (q.startsWith('D') || q.startsWith('p') || q.startsWith('z')) rawParam = q;
      }
      
      if (rawParam) updateUrlWithSearch(rawParam);

      try {
        const r = await fetch(`${API_URL}?token=${TOKEN}&cmd=${encodeURIComponent(q)}`);
        const data = await r.json();
        
        let res = `<pre style="color:#A044FF;">pivx> ${escapeHtml(q)}</pre><pre style="color:#e6ddce;">\n`;
        
        if (data.error) {
          res += `error: ${JSON.stringify(data.error)}`;
        }
        else if (q.includes('getblock') && data.result?.hash) {
          const b = data.result;
          res += `BLOQUE #${b.height}\n`;
          res += `hash: ${b.hash}\n`;
          res += `fecha: ${new Date(b.time*1000).toLocaleString()}\n`;
          res += `transacciones: ${b.tx?.length || 0}\n`;
          res += `tamaño: ${b.size || 0} bytes\n`;
          if (b.previousblockhash) res += `anterior: ${b.previousblockhash}\n`;
          if (b.nextblockhash) res += `siguiente: ${b.nextblockhash}\n`;
          
          if (b.tx && b.tx.length > 0) {
            res += `\n▶ TXIDS (${b.tx.length})\n`;
            if (typeof b.tx[0] === 'object') {
              b.tx.forEach((tx, i) => {
                const txid = tx.txid || tx;
                res += `   ${i+1}. ${txid}\n`;
              });
            } else {
              b.tx.forEach((txid, i) => {
                res += `   ${i+1}. ${txid}\n`;
              });
            }
          }
        }
        else if (q.includes('getrawtransaction') && data.result?.txid) {
          const t = data.result;
          
          const hasCoinbase = t.vin && t.vin.length > 0 && t.vin[0].coinbase !== undefined;
          const hasTransparentIn = t.vin && t.vin.length > 0;
          const hasTransparentOut = t.vout && t.vout.length > 0;
          const hasShieldedSpend = t.vShieldSpend && t.vShieldSpend.length > 0;
          const hasShieldedOutput = t.vShieldOutput && t.vShieldOutput.length > 0;
          const hasVoutZero = t.vout && t.vout.length > 0 && t.vout[0].value === 0;
          const isOnlyZeroOutput = t.vout && t.vout.length === 1 && t.vout[0].value === 0;
          const isCoinStake = !hasCoinbase && hasTransparentIn && hasVoutZero && t.vout && t.vout.length >= 2;
          const isDummyCoinbase = hasCoinbase && isOnlyZeroOutput;
          const isShielded = !hasTransparentIn && !hasTransparentOut && (hasShieldedSpend || hasShieldedOutput);
          const isShielding = hasTransparentIn && !hasTransparentOut && hasShieldedOutput && !hasShieldedSpend;
          const isDeshielding = hasShieldedSpend && !hasShieldedOutput && hasTransparentOut && !hasTransparentIn;
          
          let isColdStaking = false;
          let coldStakeOwner = null;
          let coldStakeStaker = null;
          
          if (t.vout && t.vout.length > 0) {
            t.vout.forEach(vout => {
              if (vout.scriptPubKey && vout.scriptPubKey.type === 'coldstake') {
                isColdStaking = true;
                if (vout.scriptPubKey.addresses && vout.scriptPubKey.addresses.length >= 2) {
                  coldStakeStaker = vout.scriptPubKey.addresses[0];
                  coldStakeOwner = vout.scriptPubKey.addresses[1];
                }
              }
            });
          }
          
          const isSelfDelegation = isColdStaking && coldStakeOwner && coldStakeStaker && 
                                   coldStakeOwner === coldStakeStaker;
          
          let totalIn = 0;
          let inputValues = [];
          
          if (t.vin && t.vin.length > 0 && !hasCoinbase) {
            const vinPromises = t.vin.map(async (vin, index) => {
              const value = await getVinValue(vin.txid, vin.vout);
              return { index, value };
            });
            const results = await Promise.all(vinPromises);
            results.forEach(r => {
              if (r.value !== null) {
                totalIn += r.value;
                inputValues[r.index] = r.value;
              }
            });
          }
          
          let totalOut = 0;
          if (t.vout) {
            t.vout.forEach(vout => {
              totalOut += vout.value || 0;
            });
          }
          
          if (isShielded) {
            res += `🛡 TRANSACCIÓN PRIVADA (SHIELDED)\n`;
          } else if (isShielding) {
            res += `🛡 SHIELDING (TRANSPARENTE → SHIELDED)\n`;
          } else if (isDeshielding) {
            res += `🛡 DESHIELDING (SHIELDED → TRANSPARENTE)\n`;
          } else if (isCoinStake) {
            res += `⚡️ COINSTAKE (GENERACIÓN DE BLOQUE PoS)\n`;
          } else {
            res += `📄 TRANSACCIÓN TRANSPARENTE\n`;
          }
          res += `  TXID: ${t.txid}\n`;
          res += `  bloque: #${t.blockheight || t.height || (t.blockhash ? 'en bloque' : 'no confirmada')}\n`;
          if (t.blockheight || t.height) {
            res += `  altura: ${t.blockheight || t.height}\n`;
          }
          res += `  confirmaciones: ${t.confirmations || 0}\n`;
          if (t.time || t.blocktime) {
            const ts = t.time || t.blocktime;
            res += `  fecha: ${new Date(ts*1000).toLocaleString()}\n`;
          }
          if (t.size) res += `  tamaño: ${t.size} bytes\n`;
          if (t.version) res += `  versión: ${t.version}\n`;
          if (t.expiryheight) res += `  expira: bloque ${t.expiryheight}\n`;
          
          if (t.vin && t.vin.length > 0) {
            res += `\n▶ ENTRADAS (${t.vin.length})\n`;
            t.vin.forEach((vin, i) => {
              if (vin.coinbase !== undefined) {
                if (isDummyCoinbase) {
                  res += `  [#${i}] COINBASE (dummy - bloque PoS)\n`;
                } else {
                  res += `  [#${i}] COINBASE\n`;
                }
              } else if (vin.txid) {
                const txidTrunc = formatTxid(vin.txid);
                const valorInput = inputValues[i] !== undefined ? inputValues[i].toFixed(6) : null;
                let valorStr = '';
                if (valorInput) {
                  valorStr = ` ${valorInput} PIV`;
                  if (isCoinStake) valorStr += ` (stake activo)`;
                  else if (isColdStaking) valorStr += ` (fondos a delegar)`;
                  else if (isShielding) valorStr += ` (a blindar)`;
                }
                res += `  [#${i}] desde ${txidTrunc}:${vin.vout}${valorStr}\n`;
              }
            });
            if (totalIn > 0) {
              res += `  total entrada: ${totalIn.toFixed(6)} PIV\n`;
            }
          }
          
          if (t.vout && t.vout.length > 0) {
            res += `\n◀ SALIDAS (${t.vout.length})\n`;
            t.vout.forEach((vout, i) => {
              let addr = '';
              let extraInfo = '';
              
              if (vout.scriptPubKey?.addresses?.[0]) {
                addr = formatAddress(vout.scriptPubKey.addresses[0]);
                if (vout.scriptPubKey.addresses.length > 1) {
                  extraInfo = ` (multi-address)`;
                }
              } else if (vout.scriptPubKey?.address) {
                addr = formatAddress(vout.scriptPubKey.address);
              }
              
              let tipo = '';
              
              if (isDummyCoinbase) {
                if (vout.value === 0) {
                  tipo = ' [salida nula - coinbase PoS]';
                  addr = '';
                }
              } else if (isCoinStake) {
                if (i === 0 && vout.value === 0) {
                  tipo = ' [coinstake marker]';
                  addr = '';
                } else if (i === 1 && vout.value > 0) {
                  tipo = ' ← stake (parte 1/2)';
                } else if (i === 2 && vout.value > 0) {
                  tipo = ' ← stake (parte 2/2)';
                } else if (i >= 3 && vout.value > 0) {
                  tipo = ' [recompensa]';
                }
              } else if (isColdStaking) {
                if (vout.scriptPubKey && vout.scriptPubKey.type === 'coldstake') {
                  tipo = ' [CONTRATO COLD STAKING]';
                  if (coldStakeStaker && coldStakeOwner) {
                    const relacion = isSelfDelegation ? ' (auto-delegación)' : ' (delegado a tercero)';
                    extraInfo = `\n       dueño: ${formatAddress(coldStakeOwner)}\n       staker: ${formatAddress(coldStakeStaker)}${relacion}`;
                  }
                } else {
                  if (vout.value === 0) {
                    tipo = ' [salida nula]';
                    addr = '';
                  } else if (t.vout.length > 1 && vout.value === Math.max(...t.vout.map(v => v.value || 0))) {
                    tipo = ' ← destinatario (pago)';
                  } else if (t.vout.length > 1 && vout.value < Math.max(...t.vout.map(v => v.value || 0))) {
                    tipo = ' [cambio]';
                  }
                }
              } else {
                if (vout.value === 0) {
                  tipo = ' [salida nula]';
                  addr = '';
                } else if (t.vout.length > 1 && vout.value === Math.max(...t.vout.map(v => v.value || 0))) {
                  tipo = ' ← destinatario (pago)';
                } else if (t.vout.length > 1 && vout.value < Math.max(...t.vout.map(v => v.value || 0))) {
                  tipo = ' [cambio]';
                }
              }
              
              const addrMostrar = addr ? ` → ${addr}` : '';
              res += `  [#${i}] ${vout.value.toFixed(6)} PIV${addrMostrar}${tipo}${extraInfo}\n`;
            });
            
            if (totalOut > 0) {
              if (isColdStaking && !isCoinStake) {
                res += `  total delegado: ${totalOut.toFixed(6)} PIV\n`;
              } else if (isCoinStake) {
                res += `  total generado: ${totalOut.toFixed(6)} PIV\n`;
              } else {
                res += `  total salida: ${totalOut.toFixed(6)} PIV\n`;
              }
            }
          }
          
          if (hasShieldedSpend || hasShieldedOutput) {
            res += `\n🛡 SHIELDED (SAPLING)\n\n`;
            if (hasShieldedSpend) {
              res += `\n▶ GASTOS SHIELDED (${t.vShieldSpend.length})\n`;
              t.vShieldSpend.forEach((spend, i) => {
                res += `  [#${i}] nullifier: ${spend.nullifier}\n`;
                if (spend.cv) res += `       cv: ${spend.cv}\n`;
                if (spend.rk) res += `       rk: ${spend.rk}\n`;
                if (spend.anchor) res += `       anchor: ${spend.anchor}\n`;
                if (spend.spendAuthSig) res += `       sig: ${formatTxid(spend.spendAuthSig)}\n`;
              });
            }
            if (hasShieldedOutput) {
              res += `\n▶ OUTPUTS SHIELDED (${t.vShieldOutput.length})\n`;
              t.vShieldOutput.forEach((output, i) => {
                res += `  [#${i}] cmu: ${output.cmu}\n`;
                if (output.cv) res += `       cv: ${output.cv}\n`;
                if (output.ephemeralKey) res += `       ephemeralKey: ${output.ephemeralKey}\n`;
                if (output.encCiphertext) res += `       encCiphertext: ${formatTxid(output.encCiphertext)}\n`;
                if (output.outCiphertext) res += `       outCiphertext: ${formatTxid(output.outCiphertext)}\n`;
              });
            }
            if (t.valueBalance !== undefined) {
              const balanceZec = parseFloat(t.valueBalance);
              res += `\n  valueBalance: ${balanceZec.toFixed(6)} PIV\n`;
            }
            if (t.bindingSig) {
              res += `\n  bindingSig: ${t.bindingSig}\n`;
            }
            res += `\n■ RESUMEN SHIELDED\n`;
            res += `  notas consumidas: ${t.vShieldSpend?.length || 0}\n`;
            res += `  notas creadas: ${t.vShieldOutput?.length || 0}\n`;
            if (t.valueBalance) {
              const fee = Math.abs(parseFloat(t.valueBalance));
              res += `  fee (pool shielded): ${fee.toFixed(6)} PIV\n`;
            }
            res += `  privacidad: 🛡 completa (montos ocultos)\n`;
          }
          
          res += `\n■ RESUMEN\n`;
          res += `  entradas transparentes: ${t.vin?.length || 0}\n`;
          res += `  salidas transparentes: ${t.vout?.length || 0}\n`;
          if (isShielded) res += `  actividad shielded: sí 🛡\n`;
          
          if (isDummyCoinbase) {
            res += `  tipo: coinbase (bloque PoS - sin recompensa)\n`;
          } else if (hasCoinbase && !isDummyCoinbase) {
            res += `  tipo: coinbase (PoW - no aplica en PIVX)\n`;
          } else if (isCoinStake) {
            res += `  tipo: coinstake (generación de bloque PoS)\n`;
            res += `  modo: ${isColdStaking ? 'cold staking' : 'hot staking'}\n`;
            if (totalIn > 0 && t.vout && t.vout.length >= 2) {
              const stakeFinal = t.vout[1]?.value || 0;
              const recompensaDistribuida = t.vout.slice(2).reduce((sum, v) => sum + (v.value || 0), 0);
              const recompensaTotal = totalOut - totalIn;
              const recompensaReinvertida = stakeFinal - totalIn;
              res += `  ───────────────────────────────────────\n`;
              res += `  stake activo previo: ${totalIn.toFixed(6)} PIV\n`;
              res += `  stake final: ${stakeFinal.toFixed(6)} PIV\n`;
              res += `  recompensa total: +${recompensaTotal.toFixed(6)} PIV\n`;
              res += `    ├─ reinvertida: +${recompensaReinvertida.toFixed(6)} PIV\n`;
              res += `    └─ distribuida: ${recompensaDistribuida.toFixed(6)} PIV\n`;
            }
            res += `  fee: 0 PIV (generación de bloques)\n`;
          } else if (isShielded) {
            res += `  tipo: transacción privada (sapling)\n`;
            res += `  privacidad: 🔒 total (datos ocultos)\n`;
            if (t.valueBalance) {
              const fee = Math.abs(parseFloat(t.valueBalance));
              res += `  fee: ${fee.toFixed(6)} PIV (pool shielded)\n`;
            }
          } else if (isShielding) {
            res += `  tipo: shielding (transparente → shielded)\n`;
            if (totalIn > 0) res += `  fondos blindados: ${totalIn.toFixed(6)} PIV\n`;
          } else if (isDeshielding) {
            res += `  tipo: deshielding (shielded → transparente)\n`;
            if (totalOut > 0) res += `  fondos visibles: ${totalOut.toFixed(6)} PIV\n`;
          } else if (isColdStaking && !isCoinStake) {
            res += `  tipo: delegación a cold staking\n`;
            if (coldStakeOwner && coldStakeStaker) {
              const relacion = isSelfDelegation ? 'auto-delegación' : 'delegado a tercero';
              res += `  ───────────────────────────────────────\n`;
              res += `  dueño: ${formatAddress(coldStakeOwner)}\n`;
              res += `  staker: ${formatAddress(coldStakeStaker)}\n`;
              res += `  relación: ${relacion}\n`;
            }
          }
        }
        else if (q.includes('validateaddress') && data.result) {
          const v = data.result;
          let emoji = '🔓';
          if (v.address.startsWith('p') || v.address.startsWith('z')) {
            emoji = '🔒';
          }
          res += `■ DIRECCIÓN ${v.address} ${emoji}\n`;
          res += `  válida: ${v.isvalid ? 'sí' : 'no'}\n`;
          if (v.isvalid) {
            if (v.address.startsWith('D')) res += `  tipo: transparente\n`;
            else if (v.address.startsWith('p')) {
              res += `  tipo: shielded (Sapling)\n`;
              if (v.diversifier) res += `  diversifier: ${v.diversifier}\n`;
            } else if (v.address.startsWith('z')) {
              res += `  tipo: shielded (Sprout)\n`;
            }
            if (v.ismine !== undefined) res += `  pertenece a esta wallet: ${v.ismine ? 'sí' : 'no'}\n`;
            if (v.isstaking !== undefined) res += `  staking: ${v.isstaking ? 'sí' : 'no'}\n`;
          }
        }
        
        res += `\n\n</pre>`;
        res += `<button class="copy-btn" onclick="copyResult()">[F8] copiar resultado</button>`;
        res += `<div class="result-footer"><br></div>`;
        out.innerHTML = res;
        
      } catch(e) {
        out.innerHTML = `<pre style="color:var(--red);">error: ${escapeHtml(e.message)}</pre>`;
      }
      
      document.getElementById('searchInput').value = '';
    }

    window.copyResult = function() {
      const outputPre = document.querySelector('#output pre:last-of-type');
      if (outputPre) {
        navigator.clipboard.writeText(outputPre.innerText).then(() => {
          document.querySelector('.prompt').textContent = '✓';
          setTimeout(() => document.querySelector('.prompt').textContent = '►', 1000);
        });
      }
    };

    document.addEventListener('keydown', function(e) {
      if (e.key === 'F8') { e.preventDefault(); window.copyResult(); }
      if (e.key === 'F9') {
        e.preventDefault();
        document.getElementById('searchInput').value = '';
        document.getElementById('output').innerHTML = '';
        document.querySelector('.prompt').textContent = '♥';
        setTimeout(() => document.querySelector('.prompt').textContent = '►', 1000);
        const baseUrl = window.location.origin + '/pagina/pivx-explorer';
        window.history.replaceState({}, '', baseUrl);
        loadNetworkStats();
      }
    });

    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('keydown', async (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const rawInput = searchInput.value.trim();
        if (rawInput) {
          const cmd = await detectCommand(rawInput);
          executeSearch(cmd);
        }
      }
    });
    searchInput.addEventListener('paste', () => {
      setTimeout(() => {
        const input = searchInput.value;
        detectCommand(input).then(cmd => {
          if (cmd !== input) searchInput.value = cmd;
        });
      }, 10);
    });

    (async function() {
      const searchParam = detectSearchFromUrl();
      if (searchParam) {
        window.addEventListener('load', async () => {
          setTimeout(async () => {
            const input = document.getElementById('searchInput');
            if (input) {
              input.value = searchParam;
              const cmd = await detectCommand(searchParam);
              executeSearch(cmd);
            }
          }, 500);
        });
      }
    })();

    loadNetworkStats();
    setInterval(loadNetworkStats, 30000);
  </script>
</body>
</html>
